function calcCals(){
  const mb = onbForm.sexe==='homme'
    ? 10*onbForm.poids+6.25*onbForm.taille-5*onbForm.age+5
    : 10*onbForm.poids+6.25*onbForm.taille-5*onbForm.age-161;
  const nap = {sedentaire:1.2,leger:1.375,actif:1.55,tres_actif:1.725}[onbForm.activite]||1.2;
  const dej = Math.round(mb*nap);
  const delta = {poids:-400,remise:-200,perf:0,masse:350}[onbForm.goal]||0;
  return {mb:Math.round(mb),dej,cal:Math.max(1200,Math.round(dej+delta))};
}

function calcIMC(){
  const v = onbForm.poids/Math.pow(onbForm.taille/100,2);
  const val = Math.round(v*10)/10;
  let cat,color,emoji;
  if(val<18.5){cat="Maigreur";color="#00A8D8";emoji="📉";}
  else if(val<25){cat="Normal";color="#10B981";emoji="✅";}
  else if(val<30){cat="Surpoids";color="#F59E0B";emoji="⚡";}
  else{cat="Obésité";color="#EF4444";emoji="🔴";}
  const pMin=Math.round(18.5*Math.pow(onbForm.taille/100,2));
  const pMax=Math.round(24.9*Math.pow(onbForm.taille/100,2));
  return {val,cat,color,emoji,pMin,pMax};
}

function stars(r){return[1,2,3,4,5].map(i=>i<=Math.round(r)?'★':'☆').join('');}

function toggleMenu(){
  menuOpen=!menuOpen;

}

function go(screen){
  currentScreen=screen;
  menuOpen=false;
  document.getElementById('navDropdown').style.display='none';
  document.getElementById('navArrow').textContent='▼';
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('item-'+screen);
  if(el)el.classList.add('active');

  document.getElementById('navLabel').textContent=labels[screen]||screen;
  document.getElementById('navBadge').textContent=groups[screen]||'🔑';
  render();
}
