function calcAge(){
  if(!onbForm.birthday)return onbForm.age;
  const now=new Date();
  const bday=new Date(onbForm.birthday);
  let age=now.getFullYear()-bday.getFullYear();
  const m=now.getMonth()-bday.getMonth();
  if(m<0||(m===0&&now.getDate()<bday.getDate()))age--;
  return Math.max(15,Math.min(90,age));
}

function isBirthday(){
  if(!onbForm.birthday)return false;
  const now=new Date();
  const bday=new Date(onbForm.birthday);
  return now.getMonth()===bday.getMonth()&&now.getDate()===bday.getDate();
}

function birthdayAge(){
  if(!onbForm.birthday)return null;
  const now=new Date();
  const bday=new Date(onbForm.birthday);
  let age=now.getFullYear()-bday.getFullYear();
  const m=now.getMonth()-bday.getMonth();
  if(m<0||(m===0&&now.getDate()<bday.getDate()))age--;
  return age;
}

function calcCals(){
  const age=calcAge();
  const mb = onbForm.sexe==='homme'
    ? 10*onbForm.poids+6.25*onbForm.taille-5*age+5
    : 10*onbForm.poids+6.25*onbForm.taille-5*age-161;
  const nap = {sedentaire:1.2,leger:1.375,actif:1.55,tres_actif:1.725}[onbForm.activite]||1.2;
  const dej = Math.round(mb*nap);
  const delta = {poids:-400,remise:-200,perf:0,masse:350}[onbForm.goal]||0;
  return {mb:Math.round(mb),dej,cal:Math.max(1200,Math.round(dej+delta))};
}

function calcIMC(){
  const v = onbForm.poids/Math.pow(onbForm.taille/100,2);
  const val = Math.round(v*10)/10;
  let cat,color,emoji;
  if(val<18.5){cat="Maigreur";color="#00A8D8";emoji="📉";}
  else if(val<25){cat="Normal";color="#10B981";emoji="✅";}
  else if(val<30){cat="Surpoids";color="#F59E0B";emoji="⚡";}
  else{cat="Obésité";color="#EF4444";emoji="🔴";}
  const pMin=Math.round(18.5*Math.pow(onbForm.taille/100,2));
  const pMax=Math.round(24.9*Math.pow(onbForm.taille/100,2));
  return {val,cat,color,emoji,pMin,pMax};
}

      <div style="background:linear-gradient(135deg,#05111f,#072d3d);padding:40px 20px 14px;">
        <div class="sb mb8">
          <div onclick="clearInterval(seanceTotalIv);clearInterval(seanceRestIv);go('solo_seances');" style="color:rgba(255,255,255,0.5);font-size:12px;cursor:pointer;">← Séances</div>

        <div style="background:rgba(255,255,255,0.08);border-radius:6px;overflow:hidden;margin-bottom:4px;"><div style="height:5px;background:var(--c);width:${progress}%;border-radius:6px;transition:width .3s;"></div></div>

          <div style="font-size:64px;margin-bottom:12px;">🏆</div>

        </div>
      `:seancePhase==='rest'?`
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:48px;margin-bottom:10px;">😮‍💨</div>
          <div class="gray f13 mb8">Repos — prépare-toi pour</div>
          <div class="white f16 f900 mb16">${seanceExIdx<totalEx?seq.exercises[seanceExIdx].name:'Fin de séance'}</div>
          <div style="width:120px;height:120px;border-radius:50%;border:4px solid var(--c);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 20px;background:rgba(0,200,190,0.06);">
            <div id="st-rest" style="color:var(--c);font-size:40px;font-weight:900;">${seanceRestSec}</div>
            <div class="gray f11">sec</div>
          </div>
          <button onclick="skipRest();" style="background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);border-radius:12px;padding:12px 24px;font-weight:900;font-size:13px;cursor:pointer;">Passer le repos →</button>
        </div>

          <div class="white f18 f900 mb4">${ex.name}</div>
          <div style="display:flex;justify-content:center;gap:20px;margin-bottom:16px;">
            <div><div style="color:var(--c);font-size:28px;font-weight:900;">${ex.reps}</div><div class="gray f11">reps</div></div>
            <div style="width:1px;background:rgba(255,255,255,0.1);"></div>
            <div><div style="color:var(--c);font-size:28px;font-weight:900;">${ex.sets-seanceSetsDone}</div><div class="gray f11">séries restantes</div></div>
          </div>
          <div style="display:flex;gap:6px;justify-content:center;margin-bottom:16px;">
            ${Array.from({length:ex.sets}).map((_,i)=>`<div style="width:28px;height:28px;border-radius:50%;background:${i<seanceSetsDone?'var(--c)':'rgba(255,255,255,0.1)'};border:2px solid ${i<seanceSetsDone?'var(--c)':'rgba(255,255,255,0.2)'};display:flex;align-items:center;justify-content:center;font-size:11px;">${i<seanceSetsDone?'✓':''}</div>`).join('')}
          </div>

function setOnbStep(n){onbStep=n;render();}
function setOnbForm(k,v){onbForm[k]=v;render();}

  const foods=[
    {name:'Poulet grillé',conf:94,icon:'🍗',portion:'150g',kcal:248,prot:47,gluc:0,lip:5},
    {name:'Saumon grillé',conf:93,icon:'🐟',portion:'150g',kcal:280,prot:31,gluc:0,lip:17},
    {name:'Salade César',conf:87,icon:'🥗',portion:'200g',kcal:320,prot:18,gluc:14,lip:24},
    {name:'Banane',conf:99,icon:'🍌',portion:'120g',kcal:107,prot:1,gluc:27,lip:0},

  scanPhase='scanning';

    else render();

// ─── RUN TRACKER HELPERS ───────────────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2){
  const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fmtTime(s){const m=Math.floor(s/60);const ss=s%60;return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function runCalc(){const speed=runSec>0?(runDist/(runSec/3600)):0;const cal=Math.round(runDist*(currentActivity.calPer||65));return{speed,cal};}

function initRunMap(){
  setTimeout(()=>{
    const mapEl=document.getElementById('run-map');
    if(!mapEl)return;
    mapEl.style.height='200px';
    if(runMap2){try{runMap2.remove();}catch(e){}}
    runMap2=L.map('run-map',{zoomControl:false,attributionControl:false});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(runMap2);
    runLine=L.polyline([],{color:'#00C8BE',weight:5,opacity:0.9}).addTo(runMap2);
    if(runPoints.length>1){runLine.setLatLngs(runPoints);runMap2.fitBounds(runLine.getBounds(),{padding:[20,20]});}
    else if(runPoints.length===1){runMap2.setView(runPoints[0],16);}
    else{runMap2.setView([48.8566,2.3522],15);}
  },100);
}

function addRunPoint(lat,lng){
  if(runPoints.length>0){const p=runPoints[runPoints.length-1];runDist+=haversine(p[0],p[1],lat,lng);}
  runPoints.push([lat,lng]);
  if(runLine&&runMap2){runLine.setLatLngs(runPoints);runMap2.setView([lat,lng],16);}
  updateRunStats();
}

function updateRunStats(){
  const{speed,cal}=runCalc();
  const updates={'run-time':fmtTime(runSec),'run-dist':runDist.toFixed(2)+' km','run-speed':speed.toFixed(1)+' km/h','run-cal':cal+' kcal'};
  Object.entries(updates).forEach(([id,v])=>{const el=document.getElementById(id);if(el)el.textContent=v;});
}

function startSimulation(){
  if(runSimIv)return;
  const speedFactor=currentActivity.id==='bike'?2.8:currentActivity.id==='walk'?0.5:1.0;
  runSimIv=setInterval(()=>{
    if(runState!=='running')return;
    const prev=runPoints.length>0?runPoints[runPoints.length-1]:[48.8566,2.3522];
    const[dlat,dlng]=RUN_SIM_DIRS[runSimStep%RUN_SIM_DIRS.length];
    addRunPoint(prev[0]+dlat*speedFactor,prev[1]+dlng*speedFactor);
    runSimStep++;
  },3000);
}

function startRun(){
  if(runMap2){try{runMap2.remove();}catch(e){}}runMap2=null;runLine=null;
  runState='running';runSec=0;runDist=0;runPoints=[];runSimStep=0;
  render();
  runTimerIv=setInterval(()=>{runSec++;updateRunStats();},1000);
  if(navigator.geolocation){
    runWatchId=navigator.geolocation.watchPosition(
      pos=>{addRunPoint(pos.coords.latitude,pos.coords.longitude);},
      ()=>startSimulation(),
      {enableHighAccuracy:true,maximumAge:2000,timeout:8000}
    );
    setTimeout(()=>{if(runPoints.length===0)startSimulation();},5000);
  } else {
    startSimulation();
  }
}

function pauseRun(){
  runState='paused';
  clearInterval(runTimerIv);runTimerIv=null;
  render();
}

function resumeRun(){
  runState='running';
  runTimerIv=setInterval(()=>{runSec++;updateRunStats();},1000);
  if(!runSimIv&&runWatchId==null)startSimulation();
  render();
}

function stopRun(){
  runState='finished';
  clearInterval(runTimerIv);clearInterval(runSimIv);
  runTimerIv=null;runSimIv=null;
  if(runWatchId!=null){navigator.geolocation.clearWatch(runWatchId);runWatchId=null;}
  // Save to history if meaningful run (>50m)
  if(runDist>0.05){
    const {speed,cal}=runCalc();
    runHistory.unshift({date:new Date().toLocaleDateString('fr-FR'),time:runSec,dist:runDist,speed,cal,type:'gps',activity:currentActivity.id,icon:currentActivity.icon,name:currentActivity.name});
    if(runHistory.length>10)runHistory=runHistory.slice(0,10);
    saveData();
  }
  render();
}

function resetRun(){
  runState='idle';runSec=0;runDist=0;runPoints=[];runSimStep=0;
  clearInterval(runTimerIv);clearInterval(runSimIv);
  runTimerIv=null;runSimIv=null;
  if(runWatchId!=null){navigator.geolocation.clearWatch(runWatchId);runWatchId=null;}
  if(runMap2){try{runMap2.remove();}catch(e){}}runMap2=null;runLine=null;
  render();
}

function shareRun(){
  const{speed,cal}=runCalc();
  const text=currentActivity.icon+' '+currentActivity.name+' M.C.P !\n⏱ '+fmtTime(runSec)+' | 📍 '+runDist.toFixed(2)+' km | ⚡ '+speed.toFixed(1)+' km/h | 🔥 '+cal+' kcal\n#MCP #Fitness #MonCoachPersonnel';
  if(navigator.share){navigator.share({title:'Mon activité M.C.P',text}).catch(()=>showShareLinks(text));}
  else showShareLinks(text);
}

function showShareLinks(text){
  const enc=encodeURIComponent(text);
  const panel=document.getElementById('run-share-panel');
  const wa=document.getElementById('run-wa-link');
  const tw=document.getElementById('run-tw-link');
  if(panel){panel.style.display='flex';}
  if(wa)wa.href='https://wa.me/?text='+enc;
  if(tw)tw.href='https://twitter.com/intent/tweet?text='+enc;
}

// ─── LOCALSTORAGE ──────────────────────────────────────────────────────────
function today(){return new Date().toISOString().slice(0,10);}

function saveData(){
  try{
    localStorage.setItem('mcp_onb',JSON.stringify(onbForm));
    localStorage.setItem('mcp_weight',String(weight));
    localStorage.setItem('mcp_streak',String(streak));
    localStorage.setItem('mcp_seances',String(totalSeances));
    localStorage.setItem('mcp_water',JSON.stringify({date:today(),val:water}));
    localStorage.setItem('mcp_meals',JSON.stringify({date:today(),done:meals.map(m=>m.d)}));
    localStorage.setItem('mcp_runHistory',JSON.stringify(runHistory));
    localStorage.setItem('mcp_badges',JSON.stringify(badges.map(b=>({id:b.id,earned:b.earned}))));
    localStorage.setItem('mcp_lang',currentLang);
  }catch(e){}
}

function loadData(){
  try{
    const onb=localStorage.getItem('mcp_onb');
    if(onb){onbForm={...onbForm,...JSON.parse(onb)};}
    const wt=localStorage.getItem('mcp_weight');
    if(wt)weight=parseFloat(wt);
    const st=localStorage.getItem('mcp_streak');
    if(st)streak=parseInt(st);
    const se=localStorage.getItem('mcp_seances');
    if(se)totalSeances=parseInt(se);
    const w=localStorage.getItem('mcp_water');
    if(w){const wd=JSON.parse(w);if(wd.date===today())water=wd.val;}
    const m=localStorage.getItem('mcp_meals');
    if(m){const md=JSON.parse(m);if(md.date===today())md.done.forEach((d,i)=>{if(meals[i])meals[i].d=d;});}
    const rh=localStorage.getItem('mcp_runHistory');
    if(rh)runHistory=JSON.parse(rh);
    const bds=localStorage.getItem('mcp_badges');
    if(bds){const saved=JSON.parse(bds);saved.forEach(sb=>{const b=badges.find(x=>x.id===sb.id);if(b)b.earned=sb.earned;});}
    const lg=localStorage.getItem('mcp_lang');
    if(lg&&['fr','en','es'].includes(lg))currentLang=lg;
  }catch(e){}
}

// ─── SEANCE TIMER HELPERS ──────────────────────────────────────────────────
function doneSet(){
  const seq=activeSeance;
  const ex=seq.exercises[seanceExIdx];
  seanceSetsDone++;
  if(seanceSetsDone>=ex.sets){
    // Move to next exercise
    seanceExIdx++;
    seanceSetsDone=0;
    if(seanceExIdx>=seq.exercises.length){
      // Séance terminée
      clearInterval(seanceTotalIv);seanceTotalIv=null;
      seancePhase='done';
      render();
      return;
    }
    // Rest between exercises
    startSeanceRest(seq.exercises[seanceExIdx-1].rest);
  } else {
    // Rest between sets
    startSeanceRest(ex.rest);
  }
}

function startSeanceRest(secs){
  seancePhase='rest';
  seanceRestSec=secs;
  render();
  seanceRestIv=setInterval(()=>{
    seanceRestSec--;
    const el=document.getElementById('st-rest');
    if(el)el.textContent=seanceRestSec;
    if(seanceRestSec<=0){
      clearInterval(seanceRestIv);seanceRestIv=null;
      seancePhase='exercise';
      render();
    }
  },1000);
}

function skipRest(){
  clearInterval(seanceRestIv);seanceRestIv=null;
  seancePhase='exercise';
  render();
}

function completeSeance(){
  streak++;
  totalSeances++;
  // Birthday Warrior badge
  if(isBirthday()){
    const bdayBadge=badges.find(b=>b.id==='bday');
    if(bdayBadge&&!bdayBadge.earned){
      bdayBadge.earned=true;
      // Show congrats toast
      setTimeout(()=>{
        const toast=document.createElement('div');
        toast.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7C3AED,#DB2777);color:white;padding:14px 20px;border-radius:14px;font-weight:900;font-size:13px;z-index:9999;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
        toast.innerHTML='🎂 Badge <em>Birthday Warrior</em> débloqué ! +2500 XP 👑';
        document.body.appendChild(toast);
        setTimeout(()=>toast.remove(),4000);
      },600);
    }
  }
  saveData();
  clearInterval(seanceTotalIv);seanceTotalIv=null;
  go('solo_dash');
}

function updateActDisplay(){
  const calBurned=Math.round(actTimerSec*(currentActivity.calPer/60)*(onbForm.poids/70));
  const tEl=document.getElementById('act-time');
  const cEl=document.getElementById('act-cal');
  if(tEl)tEl.textContent=fmtTime(actTimerSec);
  if(cEl)cEl.textContent=calBurned;
}

function startActTimer(){
  actTimerState='running';
  render();
  actTimerIv=setInterval(()=>{actTimerSec++;updateActDisplay();},1000);
}

function pauseActTimer(){
  actTimerState='paused';
  clearInterval(actTimerIv);actTimerIv=null;
  render();
}

function resumeActTimer(){
  actTimerState='running';
  render();
  actTimerIv=setInterval(()=>{actTimerSec++;updateActDisplay();},1000);
}

function stopActTimer(){
  actTimerState='finished';
  clearInterval(actTimerIv);actTimerIv=null;
  if(actTimerSec>30){
    const calBurned=Math.round(actTimerSec*(currentActivity.calPer/60)*(onbForm.poids/70));
    runHistory.unshift({
      date:new Date().toLocaleDateString('fr-FR'),
      time:actTimerSec,dist:0,speed:0,cal:calBurned,
      type:'timer',activity:currentActivity.id,
      icon:currentActivity.icon,name:currentActivity.name,
      laps:currentActivity.id==='swim'?actLaps:undefined
    });
    if(runHistory.length>10)runHistory=runHistory.slice(0,10);
    saveData();
  }
  render();
}

function resetActTimer(){
  clearInterval(actTimerIv);actTimerIv=null;
  actTimerSec=0;actTimerState='idle';actLaps=0;
}

function shareActivity(){
  const calBurned=Math.round(actTimerSec*(currentActivity.calPer/60)*(onbForm.poids/70));
  const lapTxt=currentActivity.id==='swim'?' | 🏊 '+actLaps+' longueurs':'';
  const text=currentActivity.icon+' '+currentActivity.name+' avec M.C.P !\n⏱ '+fmtTime(actTimerSec)+lapTxt+' | 🔥 '+calBurned+' kcal\n#MCP #Fitness #MonCoachPersonnel';
  if(navigator.share){navigator.share({title:'Mon activité M.C.P',text}).catch(()=>{});}
  else{const enc=encodeURIComponent(text);window.open('https://wa.me/?text='+enc,'_blank');}
}
